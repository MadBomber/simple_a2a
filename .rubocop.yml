AllCops:
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'examples/**/*'

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Style/Encoding:
  Enabled: false

Style/RedundantReturn:
  Enabled: false

Style/YodaCondition:
  Enabled: false

Layout/ExtraSpacing:
  Enabled: false

Layout/EmptyLines:
  Enabled: false

Layout/EmptyLineBetweenDefs:
  Enabled: true
  NumberOfEmptyLines: 2

Layout/EmptyLinesAroundClassBody:
  Enabled: false

Layout/EmptyLinesAroundMethodBody:
  Enabled: false

Layout/SpaceInsideArrayLiteralBrackets:
  Enabled: false

Layout/SpaceInsideBlockBraces:
  Enabled: false

Layout/EmptyLinesAroundBlockBody:
  Enabled: false

Layout/EmptyLineAfterMagicComment:
  Enabled: false

Layout/LineLength:
  Max: 109

Metrics/ParameterLists:
  Enabled: false

Metrics/MethodLength:
  Max: 25
  CountAsOne:
    - heredoc
    - array
    - hash

Gemspec/DevelopmentDependencies:
  Enabled: false

Metrics/AbcSize:
  Max: 25
  Exclude:
    - 'test/**/*'

Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'test/**/*'

Metrics/BlockLength:
  Exclude:
    - 'Rakefile'
    - '*.gemspec'
