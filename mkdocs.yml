site_name: simple_a2a
site_description: Ruby gem implementing the Agent2Agent (A2A) protocol
site_author: Dewayne VanHoozer
site_url: https://madbomber.github.io/simple_a2a
copyright: Copyright &copy; 2026 Dewayne VanHoozer

repo_name: MadBomber/simple_a2a
repo_url: https://github.com/MadBomber/simple_a2a
edit_uri: edit/main/docs/

theme:
  name: material

  palette:
    - scheme: default
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - scheme: slate
      primary: blue
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  icon:
    repo: fontawesome/brands/github
    logo: material/connection

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - header.autohide
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - tags

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: MadBomber
      repo: simple_a2a
      normalize_issue_symbols: true
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/css/custom.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MadBomber/simple_a2a
      name: simple_a2a on GitHub
    - icon: fontawesome/solid/gem
      link: https://rubygems.org/gems/simple_a2a
      name: simple_a2a on RubyGems
    - icon: fontawesome/solid/book
      link: https://a2a-protocol.org/latest/
      name: A2A Protocol Specification

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quick-start.md
  - Architecture:
      - Overview: architecture/index.md
      - Protocol Details: architecture/protocol.md
  - API Reference:
      - Overview: api/index.md
      - Models: api/models/index.md
      - Server: api/server/index.md
      - Client: api/client/index.md
      - Storage: api/storage/index.md
  - Guides:
      - Streaming Responses: guides/streaming.md
      - Push Notifications: guides/push-notifications.md
      - Custom Storage: guides/custom-storage.md
  - Examples:
      - Echo Agent: examples/echo-agent.md
